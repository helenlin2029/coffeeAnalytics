<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee Sales Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="toggle-btn">
        <button class="btn-switch" onclick="showView('customer')">Customer Menu</button>
        <button class="btn-switch" onclick="showView('owner')">Owner Dashboard</button>
    </nav>

    <hr>

    <div id="customer-view">
    <h1>Place Order</h1>
        
        <div class="menu-grid">
            <button class="menu-item">
                <div class="text-content">
                    <h3>Iced Caramel Macchiato</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/iced-caramel-macchiato.png" alt="Drink">
            </button>
  
            <button class="menu-item">
                <div class="text-content">
                    <h3>Latte</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/latte.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Matcha Latte</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/matcha-latte.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Cold Brew</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/cold-brew.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Mango Passionfruit Tea</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/mango-passionfruit-tea.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Americano</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/americano.png" alt="Drink">
            </button>
    </div>

    <div id="owner-view" class="hidden">
        <h1>Owner Analytics</h1>
        <div style="display: flex; gap: 20px;">
            <div class="card">
                <h3>Total Sales</h3>
                <p id="sales-display">$0.00</p>
            </div>
            <div class="card">
                <h3>Orders Today</h3>
                <p id="count-display">0</p>
            </div>
        </div>
    </div>

    <script>
        // Logic to switch screens
        function showView(viewName) {
            const customerDiv = document.getElementById('customer-view');
            const ownerDiv = document.getElementById('owner-view');

            if (viewName === 'customer') {
                customerDiv.classList.remove('hidden');
                ownerDiv.classList.add('hidden');
            } else {
                ownerDiv.classList.remove('hidden');
                customerDiv.classList.add('hidden');
            }
        }

        // This array acts as our temporary database
        let orders = [];
        function showView(viewName) {
            const customerView = document.getElementById('customer-view');
            const ownerView = document.getElementById('owner-view');

            if (viewName === 'customer') {
                customerView.style.display = 'block';
                ownerView.style.display = 'none';
            } else {
                ownerView.style.display = 'block';
                customerView.style.display = 'none';
                updateDashboard(); 
            }
        }
    </script>
</body>
</html>
