<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee Sales Analytics</title>
    <link rel="stylesheet" href="style.css">
</head>


<header>
    <h1> <p>PALO ALTO ARTISAN</p> </h1>
    <nav class="navigation">
        <a href="#" onclick="goToHome()">HOME</a>
        <a href="#">ABOUT US</a>
        <a href="#">PRODUCTS</a>
        <a href="#">CONTACT US</a>
        <a href="#" onclick="showView('owner')">STAFF USE</a>
    </nav>
</header>


<body>
    <div id="customer-view">
        
        <div class="menu-grid">
            <button class="menu-item">
                <div class="text-content">
                    <h3>Iced Caramel Macchiato</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/iced-caramel-macchiato.png" alt="Drink">
            </button>
  
            <button class="menu-item">
                <div class="text-content">
                    <h3>Latte</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/latte.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Matcha Latte</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/matcha-latte.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Cold Brew</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/cold-brew.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Mango Passionfruit Tea</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/mango-passionfruit-tea.png" alt="Drink">
            </button>

            <button class="menu-item">
                <div class="text-content">
                    <h3>Americano</h3>
                    <p>Made to spec, every time.</p>
                </div>
                <img src="images/americano.png" alt="Drink">
            </button>
    </div>

    <div id="owner-view" class="hidden">
        <h1>Owner Analytics</h1>
        <div style="display: flex; gap: 20px;">
            <div class="card">
                <h3>Total Sales</h3>
                <p id="sales-display">$0.00</p>
            </div>
            <div class="card">
                <h3>Orders Today</h3>
                <p id="count-display">0</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>

</body>
</html>
